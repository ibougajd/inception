server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    # The Nginx location block for PHP files
    location ~ \.php$ {
        # CRITICAL LINE: This tells Nginx to send FastCGI requests 
        # to the PHP-FPM container, which we will call 'php-fpm' 
        # in the docker-compose file.
        fastcgi_pass php-fpm:9000; 
        
        # Necessary FastCGI parameters
        fastcgi_index index.php;
        include fastcgi.conf;
        
        # Ensure the script file exists (Security)
        try_files $uri =404;
    }
}
